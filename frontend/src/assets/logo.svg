<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hexagon shield base -->
  <path d="M24 3L42 12V30C42 38 34 44 24 46C14 44 6 38 6 30V12L24 3Z"
        fill="url(#g2)" stroke="url(#g1)" stroke-width="1.2"/>
  <!-- Inner ring -->
  <path d="M24 8L38 16V29C38 35.5 32 40 24 42C16 40 10 35.5 10 29V16L24 8Z"
        fill="none" stroke="url(#g1)" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Center S letter -->
  <text x="24" y="31" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="16" font-weight="900"
        letter-spacing="-1" fill="url(#g1)" filter="url(#glow)">S</text>
  <!-- Corner circuit dots -->
  <circle cx="24" cy="12" r="1.2" fill="#38bdf8" opacity="0.7"/>
  <circle cx="36" cy="19" r="1" fill="#818cf8" opacity="0.5"/>
  <circle cx="36" cy="31" r="1" fill="#818cf8" opacity="0.5"/>
  <circle cx="12" cy="19" r="1" fill="#38bdf8" opacity="0.5"/>
  <circle cx="12" cy="31" r="1" fill="#38bdf8" opacity="0.5"/>
  <!-- Horizontal scan line accent -->
  <line x1="16" y1="27" x2="32" y2="27" stroke="url(#g1)" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3 2"/>
</svg>
