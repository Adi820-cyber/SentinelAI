# ══════════════════════════════════════════════════════════════════════════════
#  SentinelAI CI Pipeline
#  Runs on every push and pull request to master.
# ══════════════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx eslint .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm test

  benchmark:
    name: Detection Benchmark
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && node tests/benchmark.js
      - name: Fail if accuracy below 70%
        run: |
          cd backend
          RESULT=$(node -e "const {runBenchmark}=require('./tests/benchmark'); const r=runBenchmark(); process.exit(r.accuracy < 0.7 ? 1 : 0)")

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm audit --audit-level=high || true
      - run: cd frontend && npm audit --audit-level=high || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sentinelai:test .
      - name: Test container starts
        run: |
          docker run -d --name sentinel-test -p 5000:5000 -e OLLAMA_HOST=http://localhost:11434 sentinelai:test
          sleep 5
          docker logs sentinel-test
          docker stop sentinel-test
